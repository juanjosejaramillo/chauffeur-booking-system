name: Deploy to Hostinger

on:
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Laravel Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          envs: GH_PAT
          script: |
            cd ~/public_html/admin

            # Authenticate with GitHub (private repo) then pull
            git remote set-url origin https://${GH_PAT}@github.com/juanjosejaramillo/chauffeur-booking-system.git
            git pull origin main
            # Remove token from remote URL
            git remote set-url origin https://github.com/juanjosejaramillo/chauffeur-booking-system.git

            cd taxibook-api
            composer install --no-dev --optimize-autoloader --no-interaction

            # Backup database before migrations
            DB_DATABASE=$(grep ^DB_DATABASE .env | cut -d= -f2)
            DB_USERNAME=$(grep ^DB_USERNAME .env | cut -d= -f2)
            DB_PASSWORD=$(grep ^DB_PASSWORD .env | cut -d= -f2)
            mkdir -p ~/backups
            mysqldump -u "$DB_USERNAME" -p"$DB_PASSWORD" "$DB_DATABASE" > ~/backups/backup_$(date +%Y%m%d_%H%M%S).sql
            echo "Database backup created successfully"

            # Run migrations (non-destructive — only adds new tables/columns, never drops)
            php artisan migrate --force

            # Clear all caches then rebuild
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link 2>/dev/null || true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

  deploy-booking-frontend:
    name: Deploy Booking Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: taxibook-api/taxibook-frontend/package-lock.json

      - name: Install dependencies
        working-directory: taxibook-api/taxibook-frontend
        run: npm ci

      - name: Build
        working-directory: taxibook-api/taxibook-frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Clean old files on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            rm -rf ~/public_html/book/assets
            rm -f ~/public_html/book/index.html

      - name: Upload build to Hostinger
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          source: "taxibook-api/taxibook-frontend/dist/*"
          target: "~/public_html/book"
          strip_components: 3
          overwrite: true
